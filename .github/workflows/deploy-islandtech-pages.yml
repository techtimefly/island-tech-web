name: Deploy Island Tech Pages

on:
  push:
    branches:
      - main
    paths:
      - 'content/islandtech/posts/**'
      - 'sites/islandtech/**'
      - 'scripts/build-posts.js'
      - 'scripts/build-islandtech.js'
      - 'scripts/check-static-sites.js'
      - 'package.json'
      - '.github/workflows/deploy-islandtech-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: islandtech-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Validate static sites
        run: npm run check

      - name: Build Island Tech site
        env:
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
          REQUIRE_WEB3FORMS_KEY: '1'
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/islandtech

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
